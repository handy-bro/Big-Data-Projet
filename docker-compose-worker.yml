networks:
  hadoop-net:
    driver: bridge
    external: true

services:

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode-${MACHINE_ID}
    hostname: datanode-${MACHINE_ID}
    ports:
      - "986${MACHINE_ID}:9864"
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
    volumes:
      - datanode_data:/hadoop/dfs/data
    networks:
      - hadoop-net
    restart: unless-stopped

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager-${MACHINE_ID}
    hostname: nodemanager-${MACHINE_ID}
    depends_on:
      - datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    networks:
      - hadoop-net
    restart: unless-stopped

  redis-replica:
    image: redis:7-alpine
    container_name: redis-replica-${MACHINE_ID}
    hostname: redis-replica-${MACHINE_ID}
    ports:
      - "638${MACHINE_ID}:6379"
    command: >
      redis-server
      --replicaof redis-master 6379
      --requirepass redis2024
      --masterauth redis2024
      --appendonly yes
      --replica-read-only yes
    networks:
      - hadoop-net
    restart: unless-stopped

volumes:
  datanode_data: